# 资质代办行业全网推广自动化软件配置文件

# 系统设置
system:
  app_name: "资质代办全网推广助手"
  version: "1.0.0"
  debug: false
  data_dir: "./data"
  log_level: "INFO"
  log_retention_days: 30

# 数据库
database:
  path: "./data/qualification_bot.db"
  backup_interval_hours: 24

# 代理IP池
proxy:
  enabled: false
  api_url: ""  # 代理IP提取API
  api_key: ""
  check_interval: 300  # IP检测间隔(秒)
  max_fail_count: 3
  min_available_ips: 5
  protocols:
    - http
    - https
    - socks5

# 浏览器设置
browser:
  headless: false
  default_timeout: 30000
  slow_mo: 50  # 操作延迟(毫秒)
  viewport_width: 1366
  viewport_height: 768
  locale: "zh-CN"
  timezone_id: "Asia/Shanghai"

# 浏览器指纹
fingerprint:
  canvas_noise: true
  webgl_noise: true
  audio_noise: true
  font_randomize: true

# AI文案生成
ai_content:
  provider: "openai"  # openai / local
  api_url: "https://api.openai.com/v1"
  api_key: ""
  model: "gpt-4"
  max_tokens: 2000
  temperature: 0.8

# 资质类型文案模板
qualification_types:
  - "网络文化经营许可证"
  - "ICP经营许可证"
  - "EDI经营许可证"
  - "广播电视节目制作经营许可证"
  - "增值电信业务经营许可证"

# 文案类型
content_types:
  - name: "软文推广"
    template: "soft_article"
  - name: "科普文章"
    template: "science_article"
  - name: "对比分析"
    template: "comparison_article"
  - name: "政策解读"
    template: "policy_article"
  - name: "案例分享"
    template: "case_study"

# 发布调度
scheduler:
  publish_interval_min: 60  # 发布最小间隔(秒)
  publish_interval_max: 300  # 发布最大间隔(秒)
  daily_publish_limit: 20   # 每日发布上限
  peak_hours_start: 9       # 高峰期开始
  peak_hours_end: 11
  off_peak_hours_start: 14  # 低峰期开始
  off_peak_hours_end: 17
  retry_max: 3              # 最大重试次数
  retry_delay: 300          # 重试延迟(秒)

# 反封号策略
anti_ban:
  random_delay_min: 3000    # 随机操作最小延迟(毫秒)
  random_delay_max: 8000    # 随机操作最大延迟(毫秒)
  scroll_random: true       # 随机滚动
  mouse_move_random: true   # 随机鼠标移动
  click_offset: true        # 点击位置随机偏移
  typing_speed_vary: true   # 打字速度变化
  daily_action_limit: 50    # 每日操作上限

# 敏感词过滤
sensitive_words:
  enabled: true
  custom_words: []
  replace_char: "*"

# SEO监控
seo:
  check_interval_hours: 6
  search_engines:
    - name: "baidu"
      url: "https://www.baidu.com/s?wd="
    - name: "360"
      url: "https://www.so.com/s?q="
  max_pages: 5             # 检查前N页
  keywords: []             # 监控关键词列表

# 短信验证码
sms:
  api_url: ""
  api_key: ""
  timeout: 120
